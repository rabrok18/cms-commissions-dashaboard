[build]
  functions = "netlify/functions"
  publish = "public"

# ── Commission Dashboard ──────────────────────────────
[[redirects]]
  from = "/commission"
  to = "/commission-dashboard.html"
  status = 200

[[redirects]]
  from = "/api/commission"
  to = "/.netlify/functions/commission"
  status = 200
  force = true

[[redirects]]
  from = "/api/sync"
  to = "/.netlify/functions/sync"
  status = 200
  force = true

# ── Portal (existing) ────────────────────────────────
[[redirects]]
  from = "/"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/api/portals"
  to = "/.netlify/functions/portals"
  status = 200
  force = true

[[redirects]]
  from = "/api/proxy"
  to = "/.netlify/functions/proxy"
  status = 200
  force = true

[[redirects]]
  from = "/portal/:slug"
  to = "/.netlify/functions/serve"
  status = 200
  force = true
